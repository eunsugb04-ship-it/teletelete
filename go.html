<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>투자 정보 커뮤니티 입장 안내</title>

     여기만 수정하면 됩니다
     ========================= -->

<meta property="og:url" content="https://eunsugb04-ship-it.github.io/naver-blog2/go.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="반도체 다음 1000% 상승 랠리 주인공은?">
<meta name="twitter:description" content="매일 업데이트 되는 무료 투자정보를 참고하세요">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:#0088cc;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    "Malgun Gothic",
    sans-serif;

}


.card{

    width:90%;
    max-width:420px;

    background:#ffffff;

    border-radius:25px;

    padding:40px 25px;

    text-align:center;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.2);

}



.logo{

    width:100%;
    max-width:320px;

    border-radius:12px;

    margin-bottom:25px;

}



.circle{

    width:120px;
    height:120px;

    margin:25px auto;

    border-radius:50%;

    border:8px solid #e6f7ff;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

}



.circle:after{

    content:"";

    position:absolute;

    inset:-8px;

    border-radius:50%;

    border:8px solid transparent;

    border-top-color:#0088cc;

    animation:spin 1s linear infinite;

}



@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}



.count{

    font-size:65px;

    font-weight:900;

    color:#0088cc;

}



.animate{

    animation:pop .8s ease;

}



@keyframes pop{

    0%{
        transform:scale(.3);
        opacity:0;
    }

    50%{
        transform:scale(1.3);
        opacity:1;
    }

    100%{
        transform:scale(1);
    }

}



.message{

    font-size:20px;

    font-weight:bold;

    color:#222;

    margin-top:20px;

}



.sub{

    font-size:14px;

    color:#777;

    margin-top:10px;

}



.progress-box{

    width:100%;

    height:8px;

    background:#eee;

    border-radius:20px;

    margin-top:25px;

    overflow:hidden;

}



.progress{

    width:0%;

    height:100%;

    background:#0088cc;

    transition:1s;

}



button{

    margin-top:25px;

    width:100%;

    padding:15px;

    border:0;

    border-radius:15px;

    background:#0088cc;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}


</style>

</head>


<body>


<div class="card">


<img src="logo.PNG" class="logo" alt="logo">


<div class="circle">

<div id="count" class="count">
3
</div>

</div>


<div class="message">

잠시 후 Telegram으로 이동합니다

</div>


<div class="sub">

안전한 입장을 위해 잠시 기다려주세요

</div>


<div class="progress-box">

<div id="progress" class="progress"></div>

</div>


<button onclick="go()">

바로 입장하기 →

</button>


</div>



<script>


// Telegram 이동 주소

const url =
"https://telegram.me/+w0LsvGtTgaw4Njg9";



let number = 3;


const count =
document.getElementById("count");


const progress =
document.getElementById("progress");



function animation(){

    count.classList.remove("animate");

    void count.offsetWidth;

    count.classList.add("animate");

}



let timer=setInterval(()=>{


    number--;


    if(number>0){


        count.innerHTML=number;

        progress.style.width =
        ((3-number)/3*100)+"%";

        animation();


    }else{


        clearInterval(timer);


        count.innerHTML="GO!";

        progress.style.width="100%";


        animation();



        setTimeout(()=>{

            location.href=url;

        },700);


    }



},1000);




function go(){

    location.href=url;

}



</script>


</body>
</html>
